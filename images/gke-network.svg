<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" font-family="-apple-system, BlinkMacSystemFont, &quot;PingFang SC&quot;, &quot;Helvetica Neue&quot;, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1f2937"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/>
    </marker>
    <marker id="arrow-sm" markerWidth="8" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 8 2.5, 0 5" fill="#4b5563"/>
    </marker>
  </defs>
  <rect width="1000" height="700" fill="#ffffff"/>
  <text x="500" y="40" text-anchor="middle" font-size="22" font-weight="600" fill="#111827">GKE 网络拓扑</text>
  <text x="500" y="62" text-anchor="middle" font-size="13" fill="#6b7280">VPC + Subnet + 2 个 Secondary CIDR + 固定出口 NAT</text>
  <rect x="40" y="90" width="920" height="510" rx="8" fill="#fafafa" stroke="#9ca3af" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="60" y="112" font-size="12" fill="#4b5563" font-weight="600">GCP project: enetpulse-agent &#160;·&#160; region: europe-west3</text>
  <rect x="70" y="130" width="600" height="450" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="90" y="152" font-size="12" font-weight="600" fill="#1e40af">VPC: enetpulse-gke-vpc</text>
  <text x="280" y="152" font-size="11" fill="#3b82f6" font-style="italic">(google_compute_network)</text>
  <rect x="100" y="180" width="540" height="380" rx="6" fill="#ffffff" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="120" y="202" font-size="12" font-weight="600" fill="#1e40af">Subnet (主)</text>
  <text x="120" y="218" font-size="11" fill="#374151">primary CIDR: <tspan font-family="monospace" fill="#dc2626" font-weight="600">10.10.0.0/20</tspan> &#160;→&#160; 4,096 个 node IP</text>
  <rect x="120" y="240" width="500" height="38" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="135" y="259" font-size="11" font-weight="600" fill="#78350f">secondary range "pods"</text>
  <text x="280" y="259" font-size="11" font-family="monospace" fill="#dc2626" font-weight="600">10.20.0.0/14</text>
  <text x="400" y="259" font-size="11" fill="#78350f">→ 262,144 个 pod IP（每 pod 一个）</text>
  <text x="135" y="272" font-size="9" fill="#92400e" font-style="italic">GKE pod 网络专用，普通 GCE VM 用不到</text>
  <rect x="120" y="290" width="500" height="38" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="135" y="309" font-size="11" font-weight="600" fill="#1e3a8a">secondary range "services"</text>
  <text x="295" y="309" font-size="11" font-family="monospace" fill="#dc2626" font-weight="600">10.24.0.0/20</text>
  <text x="415" y="309" font-size="11" fill="#1e3a8a">→ 4,096 个 Service IP（ClusterIP）</text>
  <text x="135" y="322" font-size="9" fill="#1e40af" font-style="italic">K8s Service 内部 LB 虚拟 IP</text>
  <text x="120" y="362" font-size="12" font-weight="600" fill="#374151">GKE Autopilot 节点（动态扩缩）：</text>
  <g transform="translate(120, 380)">
    <rect width="160" height="120" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
    <text x="80" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#14532d">node-1</text>
    <text x="80" y="36" text-anchor="middle" font-size="9" font-family="monospace" fill="#1e40af">10.10.0.10</text>
    <circle cx="22" cy="68" r="14" fill="#fde68a" stroke="#b45309" stroke-width="1"/>
    <text x="22" y="71" text-anchor="middle" font-size="8" fill="#78350f">pod</text>
    <circle cx="60" cy="68" r="14" fill="#fde68a" stroke="#b45309" stroke-width="1"/>
    <text x="60" y="71" text-anchor="middle" font-size="8" fill="#78350f">pod</text>
    <circle cx="98" cy="68" r="14" fill="#fde68a" stroke="#b45309" stroke-width="1"/>
    <text x="98" y="71" text-anchor="middle" font-size="8" fill="#78350f">pod</text>
    <text x="80" y="100" text-anchor="middle" font-size="9" fill="#15803d">3 pods (来自 pods CIDR)</text>
  </g>
  <g transform="translate(290, 380)">
    <rect width="160" height="120" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
    <text x="80" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#14532d">node-2</text>
    <text x="80" y="36" text-anchor="middle" font-size="9" font-family="monospace" fill="#1e40af">10.10.0.11</text>
    <circle cx="22" cy="68" r="14" fill="#fde68a" stroke="#b45309" stroke-width="1"/>
    <text x="22" y="71" text-anchor="middle" font-size="8" fill="#78350f">pod</text>
    <circle cx="60" cy="68" r="14" fill="#fde68a" stroke="#b45309" stroke-width="1"/>
    <text x="60" y="71" text-anchor="middle" font-size="8" fill="#78350f">pod</text>
    <circle cx="98" cy="68" r="14" fill="#fde68a" stroke="#b45309" stroke-width="1"/>
    <text x="98" y="71" text-anchor="middle" font-size="8" fill="#78350f">pod</text>
    <text x="80" y="100" text-anchor="middle" font-size="9" fill="#15803d">3 pods (来自 pods CIDR)</text>
  </g>
  <g transform="translate(460, 380)">
    <rect width="160" height="120" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
    <text x="80" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#14532d">node-3</text>
    <text x="80" y="36" text-anchor="middle" font-size="9" font-family="monospace" fill="#1e40af">10.10.0.12</text>
    <circle cx="22" cy="68" r="14" fill="#fde68a" stroke="#b45309" stroke-width="1"/>
    <text x="22" y="71" text-anchor="middle" font-size="8" fill="#78350f">pod</text>
    <circle cx="60" cy="68" r="14" fill="#fde68a" stroke="#b45309" stroke-width="1"/>
    <text x="60" y="71" text-anchor="middle" font-size="8" fill="#78350f">pod</text>
    <circle cx="98" cy="68" r="14" fill="#fde68a" stroke="#b45309" stroke-width="1"/>
    <text x="98" y="71" text-anchor="middle" font-size="8" fill="#78350f">pod</text>
    <text x="80" y="100" text-anchor="middle" font-size="9" fill="#15803d">3 pods (来自 pods CIDR)</text>
  </g>
  <text x="370" y="525" text-anchor="middle" font-size="10" fill="#6b7280" font-style="italic">↑ 节点用 primary CIDR；pods 用 secondary "pods" CIDR；service 用 secondary "services" CIDR</text>
  <text x="830" y="152" text-anchor="middle" font-size="12" font-weight="600" fill="#7c2d12">出公网链路</text>
  <rect x="710" y="170" width="240" height="60" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="830" y="195" text-anchor="middle" font-size="13" font-weight="600" fill="#7f1d1d">Cloud Router</text>
  <text x="830" y="213" text-anchor="middle" font-size="10" fill="#991b1b" font-style="italic">google_compute_router</text>
  <rect x="710" y="252" width="240" height="60" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
  <text x="830" y="277" text-anchor="middle" font-size="13" font-weight="600" fill="#9a3412">Cloud NAT</text>
  <text x="830" y="295" text-anchor="middle" font-size="10" fill="#c2410c" font-style="italic">google_compute_router_nat</text>
  <rect x="710" y="335" width="240" height="60" rx="6" fill="#fefce8" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="830" y="360" text-anchor="middle" font-size="13" font-weight="600" fill="#713f12">Static External IP</text>
  <text x="830" y="378" text-anchor="middle" font-size="11" font-family="monospace" fill="#a16207">34.x.x.x</text>
  <rect x="710" y="430" width="240" height="80" rx="8" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="830" y="455" text-anchor="middle" font-size="12" font-weight="600" fill="#5b21b6">公网 (Internet)</text>
  <text x="830" y="475" text-anchor="middle" font-size="10" fill="#6d28d9">DataImpulse 代理 / bwin / aiscore</text>
  <text x="830" y="495" text-anchor="middle" font-size="9" fill="#7c3aed" font-style="italic">他们看到的是 34.x.x.x（不是 pod 真 IP）</text>
  <path d="M 600 410 Q 700 320 720 200" stroke="#ea580c" stroke-width="2" fill="none" marker-end="url(#arrow-orange)"/>
  <rect x="610" y="295" width="78" height="16" fill="#ffffff" opacity="0.95"/>
  <text x="649" y="308" text-anchor="middle" font-size="10" fill="#7c2d12" font-weight="600">出公网请求</text>
  <path d="M 830 230 L 830 252" stroke="#1f2937" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M 830 312 L 830 335" stroke="#1f2937" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M 830 395 L 830 430" stroke="#1f2937" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <g transform="translate(50, 620)">
    <text x="0" y="0" font-size="12" font-weight="600" fill="#111827">关键设计</text>
    <text x="0" y="20" font-size="11" fill="#374151">• <tspan font-weight="600">Pod CIDR /14</tspan>：26 万 IP，500 pod 也只用 0.2%——预留够大避免 GKE rolling 出问题</text>
    <text x="0" y="38" font-size="11" fill="#374151">• <tspan font-weight="600">私有节点 + Cloud NAT</tspan>：节点没 public IP，更安全；出网走唯一 NAT IP，方便目标站点 / 代理服务允许列表</text>
    <text x="0" y="56" font-size="11" fill="#374151">• <tspan font-weight="600">无论多少节点 → 同一个出口 IP</tspan>：DataImpulse 那边只看到一个 IP（34.x.x.x），管理白名单极简</text>
  </g>
</svg>