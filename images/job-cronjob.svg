<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 700" font-family="-apple-system, BlinkMacSystemFont, &quot;PingFang SC&quot;, &quot;Helvetica Neue&quot;, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1f2937"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/>
    </marker>
  </defs>
  <rect width="1100" height="700" fill="#ffffff"/>
  <text x="550" y="40" text-anchor="middle" font-size="22" font-weight="600" fill="#111827">CronJob → Job → Pod 链路</text>
  <text x="550" y="62" text-anchor="middle" font-size="13" fill="#6b7280">定时器 → 一次性工作单元 → 真跑容器</text>
  <g>
    <rect x="80" y="100" width="300" height="100" rx="8" fill="#fef3c7" stroke="#a16207" stroke-width="2"/>
    <text x="230" y="124" text-anchor="middle" font-size="14" font-weight="600" fill="#713f12">CronJob</text>
    <text x="230" y="144" text-anchor="middle" font-size="11" fill="#92400e">定时器：cron 表达式触发</text>
    <rect x="120" y="156" width="220" height="32" rx="4" fill="#1f2937"/>
    <text x="230" y="170" text-anchor="middle" font-size="10" font-family="monospace" fill="#fcd34d">schedule: "5 0 * * *"</text>
    <text x="230" y="183" text-anchor="middle" font-size="9" font-family="monospace" fill="#9ca3af">每天 00:05 UTC 触发一次</text>
  </g>
  <path d="M 230 200 L 230 240" stroke="#1f2937" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <rect x="240" y="208" width="120" height="18" fill="#ffffff" opacity="0.95"/>
  <text x="300" y="221" font-size="11" fill="#374151">每次触发 → 建一个 Job</text>
  <g>
    <rect x="80" y="240" width="300" height="100" rx="8" fill="#dbeafe" stroke="#1e40af" stroke-width="2"/>
    <text x="230" y="264" text-anchor="middle" font-size="14" font-weight="600" fill="#1e3a8a">Job</text>
    <text x="230" y="284" text-anchor="middle" font-size="11" fill="#1d4ed8">一次性工作单元</text>
    <text x="230" y="302" text-anchor="middle" font-size="10" fill="#1e40af">职责: "确保至少跑成功一次"</text>
    <text x="230" y="322" text-anchor="middle" font-size="10" font-family="monospace" fill="#1e40af">name: cron-bwin-29384571</text>
  </g>
  <path d="M 230 340 L 230 380" stroke="#1f2937" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <rect x="240" y="348" width="100" height="18" fill="#ffffff" opacity="0.95"/>
  <text x="290" y="361" font-size="11" fill="#374151">建 Pod 跑活</text>
  <g>
    <circle cx="230" cy="430" r="50" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
    <text x="230" y="424" text-anchor="middle" font-size="13" font-weight="600" fill="#064e3b">Pod</text>
    <text x="230" y="442" text-anchor="middle" font-size="10" fill="#065f46">跑容器</text>
    <text x="230" y="455" text-anchor="middle" font-size="9" fill="#047857">退出 = 成功</text>
  </g>
  <g transform="translate(80, 510)">
    <text x="0" y="0" font-size="12" font-weight="600" fill="#374151">Pod 退出后会发生：</text>
    <rect x="0" y="14" width="140" height="60" rx="6" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
    <text x="70" y="34" text-anchor="middle" font-size="12" font-weight="600" fill="#064e3b">退码 0（成功）</text>
    <text x="70" y="52" text-anchor="middle" font-size="10" fill="#065f46">Job 标 Completed</text>
    <text x="70" y="66" text-anchor="middle" font-size="10" fill="#065f46">Pod 不重启</text>
    <rect x="160" y="14" width="140" height="60" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="1"/>
    <text x="230" y="34" text-anchor="middle" font-size="12" font-weight="600" fill="#7f1d1d">退码 ≠ 0（失败）</text>
    <text x="230" y="52" text-anchor="middle" font-size="10" fill="#991b1b">Job 重试（默认 6 次）</text>
    <text x="230" y="66" text-anchor="middle" font-size="10" fill="#991b1b">超 backoffLimit → Failed</text>
  </g>
  <g transform="translate(450, 100)">
    <text x="0" y="-10" font-size="13" font-weight="600" fill="#111827">CronJob 时间轴示例（每天触发一次）</text>
    <line x1="0" y1="40" x2="600" y2="40" stroke="#374151" stroke-width="2"/>
    <line x1="30" y1="34" x2="30" y2="46" stroke="#374151" stroke-width="2"/>
    <text x="30" y="62" text-anchor="middle" font-size="10" fill="#6b7280">Day 1</text>
    <text x="30" y="76" text-anchor="middle" font-size="9" fill="#9ca3af">00:05 UTC</text>
    <line x1="210" y1="34" x2="210" y2="46" stroke="#374151" stroke-width="2"/>
    <text x="210" y="62" text-anchor="middle" font-size="10" fill="#6b7280">Day 2</text>
    <text x="210" y="76" text-anchor="middle" font-size="9" fill="#9ca3af">00:05 UTC</text>
    <line x1="390" y1="34" x2="390" y2="46" stroke="#374151" stroke-width="2"/>
    <text x="390" y="62" text-anchor="middle" font-size="10" fill="#6b7280">Day 3</text>
    <text x="390" y="76" text-anchor="middle" font-size="9" fill="#9ca3af">00:05 UTC</text>
    <line x1="570" y1="34" x2="570" y2="46" stroke="#374151" stroke-width="2"/>
    <text x="570" y="62" text-anchor="middle" font-size="10" fill="#6b7280">Day 4</text>
    <text x="570" y="76" text-anchor="middle" font-size="9" fill="#9ca3af">00:05 UTC</text>
    <circle cx="30" cy="40" r="6" fill="#a16207"/>
    <rect x="5" y="100" width="50" height="40" rx="4" fill="#dbeafe" stroke="#1e40af" stroke-width="1.5"/>
    <text x="30" y="118" text-anchor="middle" font-size="9" fill="#1e3a8a">Job</text>
    <text x="30" y="130" text-anchor="middle" font-size="8" fill="#1e40af">#1</text>
    <circle cx="30" cy="170" r="14" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
    <text x="30" y="173" text-anchor="middle" font-size="8" fill="#064e3b">Pod</text>
    <line x1="30" y1="86" x2="30" y2="100" stroke="#1e40af" stroke-width="1" stroke-dasharray="2,2"/>
    <line x1="30" y1="184" x2="30" y2="195" stroke="#059669" stroke-width="1" stroke-dasharray="2,2"/>
    <circle cx="210" cy="40" r="6" fill="#a16207"/>
    <rect x="185" y="100" width="50" height="40" rx="4" fill="#dbeafe" stroke="#1e40af" stroke-width="1.5"/>
    <text x="210" y="118" text-anchor="middle" font-size="9" fill="#1e3a8a">Job</text>
    <text x="210" y="130" text-anchor="middle" font-size="8" fill="#1e40af">#2</text>
    <circle cx="210" cy="170" r="14" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
    <text x="210" y="173" text-anchor="middle" font-size="8" fill="#064e3b">Pod</text>
    <line x1="210" y1="86" x2="210" y2="100" stroke="#1e40af" stroke-width="1" stroke-dasharray="2,2"/>
    <line x1="210" y1="184" x2="210" y2="195" stroke="#059669" stroke-width="1" stroke-dasharray="2,2"/>
    <circle cx="390" cy="40" r="6" fill="#a16207"/>
    <rect x="365" y="100" width="50" height="40" rx="4" fill="#dbeafe" stroke="#1e40af" stroke-width="1.5"/>
    <text x="390" y="118" text-anchor="middle" font-size="9" fill="#1e3a8a">Job</text>
    <text x="390" y="130" text-anchor="middle" font-size="8" fill="#1e40af">#3</text>
    <circle cx="390" cy="170" r="14" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
    <text x="390" y="173" text-anchor="middle" font-size="8" fill="#064e3b">Pod</text>
    <line x1="390" y1="86" x2="390" y2="100" stroke="#1e40af" stroke-width="1" stroke-dasharray="2,2"/>
    <line x1="390" y1="184" x2="390" y2="195" stroke="#059669" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="570" y="170" text-anchor="middle" font-size="10" fill="#6b7280" font-style="italic">未来…</text>
    <text x="0" y="220" font-size="11" fill="#374151">• 每次触发产生<tspan font-weight="600">独立的 Job + Pod</tspan></text>
    <text x="0" y="238" font-size="11" fill="#374151">• 旧 Job/Pod 默认保留几个用于历史查看（successfulJobsHistoryLimit）</text>
    <text x="0" y="256" font-size="11" fill="#374151">• 如果上一次还在跑没退出，下一次会被 <tspan font-family="monospace" fill="#dc2626">concurrencyPolicy</tspan> 控制（默认 Allow）</text>
  </g>
  <g transform="translate(450, 380)">
    <text x="0" y="0" font-size="13" font-weight="600" fill="#111827">三种工作负载对比</text>
    <rect x="0" y="14" width="200" height="32" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1"/>
    <text x="100" y="34" text-anchor="middle" font-size="12" font-weight="600" fill="#1e3a8a">Deployment</text>
    <rect x="200" y="14" width="200" height="32" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1"/>
    <text x="300" y="34" text-anchor="middle" font-size="12" font-weight="600" fill="#1e40af">Job</text>
    <rect x="400" y="14" width="200" height="32" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1"/>
    <text x="500" y="34" text-anchor="middle" font-size="12" font-weight="600" fill="#713f12">CronJob</text>
    <rect x="0" y="46" width="200" height="40" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
    <text x="14" y="62" font-size="10" fill="#6b7280">用途</text>
    <text x="100" y="80" text-anchor="middle" font-size="11" fill="#374151">长期跑的服务</text>
    <rect x="200" y="46" width="200" height="40" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
    <text x="300" y="80" text-anchor="middle" font-size="11" fill="#374151">一次性任务</text>
    <rect x="400" y="46" width="200" height="40" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
    <text x="500" y="80" text-anchor="middle" font-size="11" fill="#374151">定时执行的 Job</text>
    <rect x="0" y="86" width="200" height="40" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
    <text x="14" y="102" font-size="10" fill="#6b7280">何时退出</text>
    <text x="100" y="120" text-anchor="middle" font-size="11" fill="#374151">永不（pod 死了重建）</text>
    <rect x="200" y="86" width="200" height="40" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
    <text x="300" y="120" text-anchor="middle" font-size="11" fill="#374151">Pod 退码 0 即结束</text>
    <rect x="400" y="86" width="200" height="40" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
    <text x="500" y="120" text-anchor="middle" font-size="11" fill="#374151">CronJob 永不（Job 退）</text>
    <rect x="0" y="126" width="200" height="40" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
    <text x="14" y="142" font-size="10" fill="#6b7280">例子</text>
    <text x="100" y="160" text-anchor="middle" font-size="10" fill="#374151">nginx, postgres, JC</text>
    <rect x="200" y="126" width="200" height="40" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
    <text x="300" y="160" text-anchor="middle" font-size="10" fill="#374151">DB migration, manual cron</text>
    <rect x="400" y="126" width="200" height="40" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
    <text x="500" y="160" text-anchor="middle" font-size="10" fill="#374151">每日 cron-bwin extract</text>
  </g>
  <text x="550" y="675" text-anchor="middle" font-size="11" fill="#6b7280" font-style="italic">CronJob 是 K8s 唯一一个"管 Job"的资源——本质是个调度器，不直接管 Pod</text>
</svg>