<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" font-family="-apple-system, BlinkMacSystemFont, &quot;PingFang SC&quot;, &quot;Helvetica Neue&quot;, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1f2937"/>
    </marker>
    <marker id="arrow-sm" markerWidth="8" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 8 2.5, 0 5" fill="#4b5563"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
  </defs>
  <rect width="1000" height="620" fill="#ffffff"/>
  <text x="500" y="40" text-anchor="middle" font-size="22" font-weight="600" fill="#111827">Terraform 工作流</text>
  <text x="500" y="62" text-anchor="middle" font-size="13" fill="#6b7280">init → plan → apply → destroy &#160;·&#160; state 在中心</text>
  <g>
    <rect x="420" y="92" width="160" height="50" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="500" y="115" text-anchor="middle" font-size="13" font-weight="600" fill="#1e40af">Terraform Registry</text>
    <text x="500" y="132" text-anchor="middle" font-size="11" fill="#475569">公共 provider 插件库</text>
  </g>
  <path d="M 470 142 L 320 200" stroke="#1f2937" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <rect x="328" y="160" width="120" height="18" fill="#ffffff" opacity="0.95"/>
  <text x="388" y="173" text-anchor="middle" font-size="11" fill="#374151">下载 provider</text>
  <g>
    <rect x="40" y="208" width="160" height="64" rx="6" fill="#f9fafb" stroke="#9ca3af" stroke-width="1.5"/>
    <text x="120" y="230" text-anchor="middle" font-size="13" font-weight="600" fill="#111827">.tf 配置文件</text>
    <text x="120" y="248" text-anchor="middle" font-size="11" fill="#4b5563">你写的代码</text>
    <text x="120" y="262" text-anchor="middle" font-size="10" fill="#6b7280" font-style="italic">期望状态</text>
  </g>
  <g>
    <rect x="240" y="208" width="100" height="64" rx="32" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="290" y="234" text-anchor="middle" font-size="14" font-weight="600" fill="#1e3a8a">init</text>
    <text x="290" y="252" text-anchor="middle" font-size="10" fill="#1e40af">初始化</text>
    <text x="290" y="265" text-anchor="middle" font-size="9" fill="#3730a3">下载插件</text>
  </g>
  <g>
    <rect x="380" y="208" width="100" height="64" rx="32" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
    <text x="430" y="234" text-anchor="middle" font-size="14" font-weight="600" fill="#064e3b">plan</text>
    <text x="430" y="252" text-anchor="middle" font-size="10" fill="#065f46">预览差异</text>
    <text x="430" y="265" text-anchor="middle" font-size="9" fill="#047857">只读</text>
  </g>
  <g>
    <rect x="520" y="208" width="100" height="64" rx="32" fill="#ffedd5" stroke="#ea580c" stroke-width="2"/>
    <text x="570" y="234" text-anchor="middle" font-size="14" font-weight="600" fill="#7c2d12">apply</text>
    <text x="570" y="252" text-anchor="middle" font-size="10" fill="#9a3412">执行差异</text>
    <text x="570" y="265" text-anchor="middle" font-size="9" fill="#c2410c">真改资源</text>
  </g>
  <g>
    <rect x="660" y="208" width="100" height="64" rx="32" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="710" y="234" text-anchor="middle" font-size="14" font-weight="600" fill="#7f1d1d">destroy</text>
    <text x="710" y="252" text-anchor="middle" font-size="10" fill="#991b1b">销毁全部</text>
    <text x="710" y="265" text-anchor="middle" font-size="9" fill="#b91c1c">不可逆</text>
  </g>
  <path d="M 200 240 L 240 240" stroke="#1f2937" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M 340 240 L 380 240" stroke="#1f2937" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M 480 240 L 520 240" stroke="#1f2937" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M 620 240 L 660 240" stroke="#9ca3af" stroke-width="1.5" fill="none" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <g>
    <rect x="380" y="370" width="180" height="80" rx="6" fill="#f3f4f6" stroke="#374151" stroke-width="2"/>
    <text x="470" y="395" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">terraform.tfstate</text>
    <text x="470" y="415" text-anchor="middle" font-size="11" fill="#374151">Terraform 已知的</text>
    <text x="470" y="430" text-anchor="middle" font-size="11" fill="#374151">"当前云上长这样"</text>
    <text x="470" y="445" text-anchor="middle" font-size="9" fill="#6b7280" font-style="italic">JSON 文件 / 不进 git</text>
  </g>
  <g>
    <path d="M 660 388 Q 660 372 680 372 Q 686 358 706 358 Q 720 348 738 358 Q 762 354 770 374 Q 790 374 790 392 Q 790 408 770 410 L 680 410 Q 660 410 660 388 Z" fill="#ecfeff" stroke="#0891b2" stroke-width="1.5"/>
    <rect x="640" y="416" width="180" height="40" rx="4" fill="#cffafe" stroke="#0e7490" stroke-width="1"/>
    <text x="730" y="385" text-anchor="middle" font-size="11" fill="#155e75" font-weight="600">云资源</text>
    <text x="730" y="432" text-anchor="middle" font-size="11" fill="#0c4a6e">VPC · VM · Bucket · IAM</text>
    <text x="730" y="448" text-anchor="middle" font-size="9" fill="#155e75" font-style="italic">真实存在的对象</text>
  </g>
  <path d="M 430 272 L 430 370" stroke="#059669" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <rect x="408" y="312" width="44" height="16" fill="#ffffff" opacity="0.95"/>
  <text x="430" y="324" text-anchor="middle" font-size="10" fill="#064e3b">读</text>
  <path d="M 555 272 L 510 370" stroke="#ea580c" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <rect x="510" y="305" width="56" height="16" fill="#ffffff" opacity="0.95"/>
  <text x="538" y="317" text-anchor="middle" font-size="10" fill="#7c2d12">读 + 写</text>
  <path d="M 600 272 L 690 358" stroke="#ea580c" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <rect x="610" y="305" width="78" height="16" fill="#ffffff" opacity="0.95"/>
  <text x="649" y="317" text-anchor="middle" font-size="10" fill="#7c2d12">创建 / 修改</text>
  <path d="M 720 272 L 740 358" stroke="#dc2626" stroke-width="1.5" fill="none" marker-end="url(#arrow-red)"/>
  <rect x="724" y="305" width="36" height="16" fill="#ffffff" opacity="0.95"/>
  <text x="742" y="317" text-anchor="middle" font-size="10" fill="#7f1d1d">删除</text>
  <path d="M 705 272 Q 580 350 560 410" stroke="#dc2626" stroke-width="1.5" fill="none" marker-end="url(#arrow-red)" stroke-dasharray="3,3"/>
  <rect x="610" y="345" width="48" height="16" fill="#ffffff" opacity="0.95"/>
  <text x="634" y="357" text-anchor="middle" font-size="10" fill="#7f1d1d">清空</text>
  <g transform="translate(40, 510)">
    <text x="0" y="0" font-size="12" font-weight="600" fill="#111827">图例</text>
    <circle cx="56" cy="20" r="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
    <text x="68" y="24" font-size="11" fill="#374151">init（蓝）一次性下载</text>
    <circle cx="220" cy="20" r="6" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
    <text x="232" y="24" font-size="11" fill="#374151">plan（绿）只读对比</text>
    <circle cx="380" cy="20" r="6" fill="#ffedd5" stroke="#ea580c" stroke-width="1.5"/>
    <text x="392" y="24" font-size="11" fill="#374151">apply（橙）真改云</text>
    <circle cx="540" cy="20" r="6" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
    <text x="552" y="24" font-size="11" fill="#374151">destroy（红）销毁</text>
    <rect x="710" y="14" width="12" height="12" fill="#f3f4f6" stroke="#374151" stroke-width="1.5"/>
    <text x="728" y="24" font-size="11" fill="#374151">state 中心枢纽</text>
    <line x1="56" y1="48" x2="86" y2="48" stroke="#1f2937" stroke-width="1.5" marker-end="url(#arrow-sm)"/>
    <text x="92" y="52" font-size="11" fill="#374151">主路径</text>
    <line x1="170" y1="48" x2="200" y2="48" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-sm)"/>
    <text x="206" y="52" font-size="11" fill="#374151">较少用 / 危险路径</text>
  </g>
  <text x="500" y="595" text-anchor="middle" font-size="11" fill="#6b7280" font-style="italic">声明式：你描述"想要什么"，Terraform 比较 .tf 与 state，自动算出"要做什么"</text>
</svg>