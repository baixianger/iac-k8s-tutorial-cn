<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" font-family="-apple-system, BlinkMacSystemFont, &quot;PingFang SC&quot;, &quot;Helvetica Neue&quot;, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1f2937"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
    </marker>
  </defs>
  <rect width="1200" height="780" fill="#ffffff"/>
  <text x="600" y="40" text-anchor="middle" font-size="24" font-weight="600" fill="#111827">端到端流程总览</text>
  <text x="600" y="62" text-anchor="middle" font-size="13" fill="#6b7280">从你写第一行 .tf → 数据真的落到 GCS bucket — 全链路一图</text>
  <rect x="40" y="90" width="360" height="36" rx="6" fill="#dbeafe" stroke="#1e40af" stroke-width="1.5"/>
  <text x="220" y="113" text-anchor="middle" font-size="14" font-weight="600" fill="#1e3a8a">阶段 1: 建基础设施 (Terraform)</text>
  <rect x="420" y="90" width="360" height="36" rx="6" fill="#fef3c7" stroke="#a16207" stroke-width="1.5"/>
  <text x="600" y="113" text-anchor="middle" font-size="14" font-weight="600" fill="#713f12">阶段 2: 部署系统组件 (kubectl)</text>
  <rect x="800" y="90" width="360" height="36" rx="6" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="980" y="113" text-anchor="middle" font-size="14" font-weight="600" fill="#064e3b">阶段 3: 跑数据抓取 (workload)</text>
  <g>
    <circle cx="100" cy="180" r="22" fill="#e5e7eb" stroke="#374151" stroke-width="1.5"/>
    <text x="100" y="184" text-anchor="middle" font-size="14" fill="#374151">👤</text>
    <text x="100" y="220" text-anchor="middle" font-size="11" font-weight="600" fill="#111827">Operator</text>
  </g>
  <g>
    <rect x="180" y="155" width="180" height="60" rx="6" fill="#f9fafb" stroke="#9ca3af" stroke-width="1.5"/>
    <text x="270" y="175" text-anchor="middle" font-size="11" font-weight="600" fill="#111827">.tf 配置</text>
    <text x="270" y="190" text-anchor="middle" font-size="9" font-family="monospace" fill="#475569">cluster.tf · network.tf</text>
    <text x="270" y="203" text-anchor="middle" font-size="9" font-family="monospace" fill="#475569">storage.tf · iam.tf</text>
  </g>
  <path d="M 122 180 L 180 180" stroke="#1f2937" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="151" y="174" text-anchor="middle" font-size="9" fill="#374151">写</text>
  <g>
    <rect x="60" y="265" width="320" height="50" rx="25" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="220" y="290" text-anchor="middle" font-size="14" font-weight="600" fill="#1e3a8a">terraform apply</text>
    <text x="220" y="306" text-anchor="middle" font-size="10" fill="#1e40af">~10 min</text>
  </g>
  <path d="M 220 215 L 220 265" stroke="#1f2937" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <g>
    <rect x="60" y="345" width="320" height="160" rx="6" fill="#eff6ff" stroke="#1e40af" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="220" y="367" text-anchor="middle" font-size="12" font-weight="600" fill="#1e3a8a">GCP 上自动建出来</text>
    <text x="78" y="380" font-size="11" fill="#1e40af">•</text>
    <text x="92" y="380" font-size="11" font-weight="600" fill="#1e3a8a">VPC + Subnet</text>
    <text x="220" y="380" font-size="10" fill="#475569">10.10.0.0/20</text>
    <text x="78" y="404" font-size="11" fill="#1e40af">•</text>
    <text x="92" y="404" font-size="11" font-weight="600" fill="#1e3a8a">GKE Autopilot</text>
    <text x="220" y="404" font-size="10" fill="#475569">Cluster + nodes</text>
    <text x="78" y="428" font-size="11" fill="#1e40af">•</text>
    <text x="92" y="428" font-size="11" font-weight="600" fill="#1e3a8a">Artifact Registry</text>
    <text x="220" y="428" font-size="10" fill="#475569">Docker repo</text>
    <text x="78" y="452" font-size="11" fill="#1e40af">•</text>
    <text x="92" y="452" font-size="11" font-weight="600" fill="#1e3a8a">GCS Buckets ×2</text>
    <text x="220" y="452" font-size="10" fill="#475569">websites + audit</text>
    <text x="78" y="476" font-size="11" fill="#1e40af">•</text>
    <text x="92" y="476" font-size="11" font-weight="600" fill="#1e3a8a">Service Accounts</text>
    <text x="220" y="476" font-size="10" fill="#475569">GSA + WI binding</text>
  </g>
  <path d="M 220 315 L 220 345" stroke="#1f2937" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M 380 425 Q 410 425 420 425" stroke="#7c3aed" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="400" y="416" text-anchor="middle" font-size="9" fill="#5b21b6" font-weight="600">集群 ready</text>
  <g>
    <rect x="440" y="155" width="320" height="60" rx="30" fill="#fef3c7" stroke="#a16207" stroke-width="2"/>
    <text x="600" y="183" text-anchor="middle" font-size="14" font-weight="600" fill="#713f12">kubectl apply -k manifests/</text>
    <text x="600" y="201" text-anchor="middle" font-size="10" fill="#92400e">通过 kustomize 部署系统组件</text>
  </g>
  <g>
    <rect x="440" y="265" width="320" height="240" rx="6" fill="#fffbeb" stroke="#a16207" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="600" y="287" text-anchor="middle" font-size="12" font-weight="600" fill="#713f12">browser-service namespace 里</text>
    <rect x="460" y="305" width="280" height="50" rx="4" fill="#ffffff" stroke="#a16207" stroke-width="1"/>
    <text x="600" y="324" text-anchor="middle" font-size="11" font-weight="600" fill="#713f12">K8s Manager (Deployment)</text>
    <text x="600" y="342" text-anchor="middle" font-size="9" fill="#92400e">FastAPI · 暴露给 AgentUI 的入口</text>
    <rect x="460" y="365" width="280" height="50" rx="4" fill="#ffffff" stroke="#a16207" stroke-width="1"/>
    <text x="600" y="384" text-anchor="middle" font-size="11" font-weight="600" fill="#713f12">Job Creator (Deployment)</text>
    <text x="600" y="402" text-anchor="middle" font-size="9" fill="#92400e">PG-backed scheduler · 调度 inpage Job</text>
    <rect x="460" y="425" width="280" height="50" rx="4" fill="#ffffff" stroke="#a16207" stroke-width="1"/>
    <text x="600" y="444" text-anchor="middle" font-size="11" font-weight="600" fill="#713f12">PostgreSQL (StatefulSet)</text>
    <text x="600" y="462" text-anchor="middle" font-size="9" fill="#92400e">unified_jobs 表 · 任务队列</text>
    <text x="600" y="495" text-anchor="middle" font-size="9" fill="#6b7280" font-style="italic">+ ConfigMap (workload templates) + Secrets</text>
  </g>
  <path d="M 600 215 L 600 265" stroke="#1f2937" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M 760 425 Q 790 425 800 425" stroke="#7c3aed" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="780" y="416" text-anchor="middle" font-size="9" fill="#5b21b6" font-weight="600">系统 ready</text>
  <g>
    <rect x="820" y="155" width="320" height="60" rx="30" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
    <text x="980" y="183" text-anchor="middle" font-size="14" font-weight="600" fill="#064e3b">Manual cron 触发</text>
    <text x="980" y="201" text-anchor="middle" font-size="10" fill="#065f46">AgentUI 点按钮 / curl POST</text>
  </g>
  <g>
    <rect x="820" y="240" width="320" height="80" rx="6" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/>
    <text x="980" y="262" text-anchor="middle" font-size="12" font-weight="600" fill="#064e3b">Cron Pod 跑起来</text>
    <text x="980" y="282" text-anchor="middle" font-size="10" fill="#065f46">Camoufox 浏览器 → 走 NAT IP →</text>
    <text x="980" y="298" text-anchor="middle" font-size="10" fill="#065f46">DataImpulse 代理 → bwin.dk</text>
    <text x="980" y="313" text-anchor="middle" font-size="10" font-weight="600" fill="#047857">提取 912 events</text>
  </g>
  <path d="M 980 215 L 980 240" stroke="#1f2937" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <g>
    <rect x="820" y="345" width="320" height="60" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
    <text x="980" y="365" text-anchor="middle" font-size="11" font-weight="600" fill="#9a3412">Job Creator 写入 PG + 调度</text>
    <text x="980" y="383" text-anchor="middle" font-size="10" fill="#c2410c">每 10s poll → 创建 inpage Job</text>
    <text x="980" y="397" text-anchor="middle" font-size="10" font-family="monospace" fill="#7c2d12">unified_jobs: 912 rows</text>
  </g>
  <path d="M 980 320 L 980 345" stroke="#1f2937" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <g>
    <rect x="820" y="430" width="320" height="60" rx="6" fill="#fdf4ff" stroke="#a855f7" stroke-width="1.5"/>
    <text x="980" y="450" text-anchor="middle" font-size="11" font-weight="600" fill="#581c87">Inpage Pods 并行抓取</text>
    <text x="980" y="468" text-anchor="middle" font-size="10" fill="#6b21a8">每 pod 一个 event_url，每 20 min 一次</text>
    <text x="980" y="482" text-anchor="middle" font-size="10" fill="#6b21a8">运行 2 小时直到比赛结束</text>
  </g>
  <path d="M 980 405 L 980 430" stroke="#1f2937" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="600" y="555" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">最终：数据落到哪里</text>
  <g>
    <rect x="200" y="580" width="280" height="100" rx="6" fill="#cffafe" stroke="#0891b2" stroke-width="1.5"/>
    <text x="340" y="605" text-anchor="middle" font-size="12" font-weight="600" fill="#155e75">GCS Audit Bucket</text>
    <text x="340" y="624" text-anchor="middle" font-size="10" font-family="monospace" fill="#0c4a6e">gs://enetpulse-agent-audit/</text>
    <text x="340" y="644" text-anchor="middle" font-size="10" fill="#155e75">multi-step/{site}/{sport}-{key8}/</text>
    <text x="340" y="658" text-anchor="middle" font-size="10" fill="#155e75">{date}/scheduled.json</text>
    <text x="340" y="673" text-anchor="middle" font-size="9" fill="#0e7490" font-style="italic">cron + inpage pod 都写</text>
  </g>
  <g>
    <rect x="720" y="580" width="280" height="100" rx="6" fill="#fce7f3" stroke="#be185d" stroke-width="1.5"/>
    <text x="860" y="605" text-anchor="middle" font-size="12" font-weight="600" fill="#831843">DataSink (HTTP POST)</text>
    <text x="860" y="624" text-anchor="middle" font-size="10" font-family="monospace" fill="#9d174d">ppsd-sdc.enetpulse.com:3938</text>
    <text x="860" y="644" text-anchor="middle" font-size="10" fill="#831843">multipart form-data</text>
    <text x="860" y="658" text-anchor="middle" font-size="10" fill="#831843">每事件一次 POST，fire-and-forget</text>
    <text x="860" y="673" text-anchor="middle" font-size="9" fill="#9d174d" font-style="italic">客户的生产消费端</text>
  </g>
  <path d="M 900 490 Q 700 540 470 580" stroke="#0891b2" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <rect x="610" y="540" width="56" height="16" fill="#ffffff" opacity="0.95"/>
  <text x="638" y="552" text-anchor="middle" font-size="10" fill="#155e75">audit_write</text>
  <path d="M 980 490 Q 980 540 870 580" stroke="#be185d" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <rect x="918" y="540" width="56" height="16" fill="#ffffff" opacity="0.95"/>
  <text x="946" y="552" text-anchor="middle" font-size="10" fill="#831843">write_each</text>
  <text x="600" y="730" text-anchor="middle" font-size="12" fill="#374151" font-weight="600">每个阶段都是一次 git commit + 一条命令——完全可重复、可 review、可回滚</text>
  <text x="600" y="755" text-anchor="middle" font-size="10" fill="#6b7280" font-style="italic">教程 ch 03-08 教阶段 1 写法 · ch 11-15 教阶段 2 · ch 16-17 教阶段 3 + 工具调用</text>
</svg>